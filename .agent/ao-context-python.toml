# ============================================================
# .agent/ao-context-python.toml
# ============================================================

[meta]
produced_by = "OpenAI ChatGPT"
produced_on = "2026-04-05"
source_mode = "declared-first"
inferred = [
  "defaults.python.build_backend",
  "defaults.python.testing",
  "defaults.python.code_style",
  "defaults.python.structure",
  "defaults.python.security",
  "defaults.python.docs",
  "defaults.python.norms",
]
gaps = [
  "Python context is largely derived from declared config and authoritative external source designation rather than direct repository scan.",
  "No direct evidence from the referenced authoritative Python repository was inspected in-session.",
]
divergences = []

[defaults.python]
package_manager = "uv"
layout = "src"
build_backend = "hatchling"
formatter = "ruff format"
linter = "ruff check"
type_checker = "pyright strict"
test_runner = "pytest"
ci = "github-actions"
requires_python = ">=3.14"

[defaults.python.testing]
coverage_tool = "pytest-cov"
coverage_threshold = 80
test_location = "tests/"
test_naming = "test_<module>.py; test_<function>_<condition>"
fixtures_over_setup = true
no_test_interdependence = true

[defaults.python.code_style]
max_function_lines = 30
max_cyclomatic_complexity = 5
max_nesting_depth = 3
docstring_style = "google"
docstring_required_on = "all public functions and classes"
type_annotations = "required on all public functions; pyright strict"
import_order = "stdlib, third-party, local; absolute imports only"
no_wildcard_imports = true
all_exports_explicit = false

[defaults.python.structure]
naming = "snake_case files/functions/variables; PascalCase classes"
structure = "src layout: src/<package>/, tests/, docs/"
style_enforced_by = "ruff and repository CI when configured"
test_pattern = "tests/ mirrors src/; test_<module>.py; test_<function>_<condition>"
py_typed_marker = false

[defaults.python.security]
bandit_enabled = true
bandit_severity_threshold = "medium"
deptry_enabled = true

[defaults.python.docs]
doc_tool = "zensical"
doc_output = "site/"
api_docs_autogenerated = true

[defaults.python.norms]
uv_only = "do not use pip directly; all installs via uv"
no_mutable_defaults = "never use mutable default arguments; use None and assign in body"
logging_style = "use standard logging module; configure at app boundary not library"
environment_vars = "use os.environ with explicit defaults; no dotenv in production code"
exception_style = "raise specific exceptions; include context message; use 'from' chaining"