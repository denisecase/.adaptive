[meta]
produced_by = "OpenAI ChatGPT"
produced_on = "2026-04-05"
source_mode = "declared-first"
inferred = [
  "repo.primary_language",
  "conventions.style_enforced_by",
  "sources.items",
]
gaps = [
  "No formal AO schema document was provided in this session, so field selection is inferred from AO examples and local config structure.",
  "Repository contents were described but not fully scanned in-session, so some observed patterns remain provisional.",
]
divergences = []

[repo]
type = "general"
primary_language = ["toml", "md", "yml"]

[alignment]
best_practices_stance = "balanced"

[conventions]
naming = "descriptive, explicit, consistent with existing repository patterns"
structure = "professional repository structure with clear separation of concerns"
style_enforced_by = "repository-local tooling and CI when present"
commit_style = "not globally enforced"
comment_style = "explicit, inspectable, professional"

[done]
definition = "repository artifacts conform to declared conventions, generated context is inspectable, and configured checks pass when present"
review_required = true
ci_must_pass = true
deploy_process = "repository-specific"

[ownership]
model = "single-maintainer or small-team by repository"

[norms]
inspect_before_acting = true
prefer_local_patterns_over_external_preferences = true
explicit_reasoning_required = true

[sources]
default_mode = "declared-first"

[[sources.items]]
name = "train-100-unigram"
url = "https://github.com/toy-gpt/train-100-unigram"
authoritative_for = ["python", "testing", "ci", "packaging", "structure", "naming", "docs"]

[[sources.items]]
name = "current-repo"
path = "."
authoritative_for = ["agent-context", "agent-config", "prompts", "workflows"]