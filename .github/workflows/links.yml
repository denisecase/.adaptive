# ============================================================
# .github/workflows/links.yml (Lychee Link Checker)
# ============================================================
# WHY: Calls org-level action; maintained centrally

name: Check Links

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 2 * *"

permissions:
  contents: read
  issues: write

jobs:
  links:
    uses: adaptive-interfaces/.github/.github/workflows/links.yml@main